spring.application.name=mvc-rest
spring.main.web-application-type=servlet
spring.config.import=optional:file:.env[.properties]

# --- MySQL datasource configuration -------------------------------------
# Replace the user/password and database name below with your values.
# Example create statements (MySQL shell):
#   CREATE DATABASE mvc_rest CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#   CREATE USER 'mvc_user'@'localhost' IDENTIFIED BY 'secret_password';
#   GRANT ALL PRIVILEGES ON mvc_rest.* TO 'mvc_user'@'localhost';

# JDBC URL: adjust host, port, and database name as needed

# Use environment variables for sensitive values. For CI/production set the
# following environment variables: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
# SPRING_DATASOURCE_PASSWORD. On local dev you can create a .env file (gitignored)
# and Spring Boot will import it when running from the project root.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mvc_rest?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Do not hardcode a Hibernate dialect here; let Spring/Hibernate auto-detect it
# or set a dialect in production-specific config if necessary.
spring.profiles.active=${SPRING_PROFILES_ACTIVE}
