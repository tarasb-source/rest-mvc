version: 2.1
orbs:
  codecov: codecov/codecov@5

jobs:
  build-and-test:
    docker:
      - image: cimg/openjdk:26.0
    steps:
      - checkout
      - run:
          name: Build and test with coverage
          command: mvn -B clean verify
      - codecov/upload:
          files: target/site/jacoco/jacoco.xml

workflows:
  build-test-upload:
    jobs:
      - build-and-test